<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Flow — Life Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══ THEMES ═══ */
:root {
  --bg:#0a0a0a;--bg2:#111;--bg3:#1c1c1c;--bg4:#262626;--bg5:#303030;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.16);
  --text:#f5f5f5;--text2:#888;--text3:#444;
  --accent:#d4ff47;--accent2:rgba(212,255,71,0.12);--accent3:rgba(212,255,71,0.28);
  --red:#ff4d6d;--amber:#ffbe0b;--teal:#06d6a0;--blue:#4cc9f0;--purple:#c77dff;--pink:#ff6eb4;--orange:#ff7c43;
  --font:"DM Sans",sans-serif;--mono:"DM Mono",monospace;--r:12px;--r2:18px;
}
[data-theme="light"]{
  --tag-work-bg:rgba(0,80,180,0.12);--tag-biz-bg:rgba(0,120,80,0.12);
  --tag-personal-bg:rgba(100,0,180,0.12);--tag-lifestyle-bg:rgba(180,0,100,0.12);
  --tag-chores-bg:rgba(160,100,0,0.12);--tag-health-bg:rgba(0,120,80,0.12);
  --tag-finance-bg:rgba(0,80,180,0.12);--tag-high-bg:rgba(200,0,60,0.12);
  --tag-med-bg:rgba(180,120,0,0.12);--tag-low-bg:rgba(0,120,80,0.12);
  --red:#cc2244;--amber:#cc8800;--teal:#007755;--blue:#0055aa;--purple:#6600bb;--pink:#bb0066;--orange:#cc5500;
  --bg:#f0f0eb;--bg2:#ffffff;--bg3:#e8e8e2;--bg4:#dcdcd6;--bg5:#d0d0ca;
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.18);
  --text:#111;--text2:#666;--text3:#aaa;
  --accent:#2d7a00;--accent2:rgba(45,122,0,0.1);--accent3:rgba(45,122,0,0.22);
}
[data-theme="purple-dark"]{
  --bg:#0d0014;--bg2:#13001f;--bg3:#1e0030;--bg4:#280040;--bg5:#320052;
  --border:rgba(199,125,255,0.12);--border2:rgba(199,125,255,0.24);
  --text:#f0e6ff;--text2:#9966cc;--text3:#5a3a7a;
  --accent:#d966ff;--accent2:rgba(217,102,255,0.12);--accent3:rgba(217,102,255,0.28);
}
[data-theme="purple-light"]{
  --tag-work-bg:rgba(0,80,180,0.12);--tag-biz-bg:rgba(0,120,80,0.12);
  --tag-personal-bg:rgba(100,0,180,0.12);--tag-lifestyle-bg:rgba(180,0,100,0.12);
  --tag-chores-bg:rgba(160,100,0,0.12);--tag-health-bg:rgba(0,120,80,0.12);
  --tag-finance-bg:rgba(0,80,180,0.12);--tag-high-bg:rgba(200,0,60,0.12);
  --tag-med-bg:rgba(180,120,0,0.12);--tag-low-bg:rgba(0,120,80,0.12);
  --red:#cc2244;--amber:#cc8800;--teal:#007755;--blue:#0055aa;--purple:#6600bb;--pink:#bb0066;--orange:#cc5500;
  --bg:#f5eeff;--bg2:#ffffff;--bg3:#ede0ff;--bg4:#e0ccff;--bg5:#d4b8ff;
  --border:rgba(150,50,200,0.12);--border2:rgba(150,50,200,0.24);
  --text:#2d0060;--text2:#8844bb;--text3:#bb99dd;
  --accent:#7700cc;--accent2:rgba(119,0,204,0.1);--accent3:rgba(119,0,204,0.22);
}
[data-theme="ocean-dark"]{
  --bg:#020c1b;--bg2:#071526;--bg3:#0d2137;--bg4:#122d4a;--bg5:#17395d;
  --border:rgba(76,201,240,0.1);--border2:rgba(76,201,240,0.22);
  --text:#e0f4ff;--text2:#5a9ab5;--text3:#2d5a70;
  --accent:#4cc9f0;--accent2:rgba(76,201,240,0.12);--accent3:rgba(76,201,240,0.26);
}
[data-theme="ocean-light"]{
  --tag-work-bg:rgba(0,80,180,0.12);--tag-biz-bg:rgba(0,120,80,0.12);
  --tag-personal-bg:rgba(100,0,180,0.12);--tag-lifestyle-bg:rgba(180,0,100,0.12);
  --tag-chores-bg:rgba(160,100,0,0.12);--tag-health-bg:rgba(0,120,80,0.12);
  --tag-finance-bg:rgba(0,80,180,0.12);--tag-high-bg:rgba(200,0,60,0.12);
  --tag-med-bg:rgba(180,120,0,0.12);--tag-low-bg:rgba(0,120,80,0.12);
  --red:#cc2244;--amber:#cc8800;--teal:#005544;--blue:#003388;--purple:#440099;--pink:#880055;--orange:#cc5500;
  --bg:#e8f6ff;--bg2:#ffffff;--bg3:#d4edfa;--bg4:#bfe3f5;--bg5:#aad8ef;
  --border:rgba(0,100,150,0.12);--border2:rgba(0,100,150,0.24);
  --text:#002a40;--text2:#2277aa;--text3:#88bbcc;
  --accent:#0077aa;--accent2:rgba(0,119,170,0.1);--accent3:rgba(0,119,170,0.22);
}
[data-theme="pink-dark"]{
  --bg:#140008;--bg2:#1e000f;--bg3:#2d0018;--bg4:#3d0022;--bg5:#4d002c;
  --border:rgba(255,110,180,0.12);--border2:rgba(255,110,180,0.26);
  --text:#ffe6f2;--text2:#cc5599;--text3:#7a3355;
  --accent:#ff6eb4;--accent2:rgba(255,110,180,0.12);--accent3:rgba(255,110,180,0.28);
}
[data-theme="pink-light"]{
  --tag-work-bg:rgba(0,80,180,0.12);--tag-biz-bg:rgba(0,120,80,0.12);
  --tag-personal-bg:rgba(100,0,180,0.12);--tag-lifestyle-bg:rgba(180,0,100,0.12);
  --tag-chores-bg:rgba(160,100,0,0.12);--tag-health-bg:rgba(0,120,80,0.12);
  --tag-finance-bg:rgba(0,80,180,0.12);--tag-high-bg:rgba(200,0,60,0.12);
  --tag-med-bg:rgba(180,120,0,0.12);--tag-low-bg:rgba(0,120,80,0.12);
  --red:#990033;--amber:#cc8800;--teal:#007755;--blue:#0055aa;--purple:#6600bb;--pink:#990033;--orange:#cc5500;
  --bg:#fff0f7;--bg2:#ffffff;--bg3:#ffe0ef;--bg4:#ffd0e7;--bg5:#ffbfde;
  --border:rgba(200,50,120,0.12);--border2:rgba(200,50,120,0.24);
  --text:#5a0030;--text2:#cc3377;--text3:#dd99bb;
  --accent:#cc0055;--accent2:rgba(204,0,85,0.1);--accent3:rgba(204,0,85,0.22);
}
[data-theme="sage-dark"]{
  --bg:#080e0a;--bg2:#0d1710;--bg3:#152018;--bg4:#1c2a20;--bg5:#233528;
  --border:rgba(100,180,120,0.12);--border2:rgba(100,180,120,0.24);
  --text:#e6f5ea;--text2:#6aa87a;--text3:#3a6048;
  --accent:#7dd99a;--accent2:rgba(125,217,154,0.12);--accent3:rgba(125,217,154,0.26);
}
[data-theme="sage-light"]{
  --tag-work-bg:rgba(0,80,180,0.12);--tag-biz-bg:rgba(0,120,80,0.12);
  --tag-personal-bg:rgba(100,0,180,0.12);--tag-lifestyle-bg:rgba(180,0,100,0.12);
  --tag-chores-bg:rgba(160,100,0,0.12);--tag-health-bg:rgba(0,120,80,0.12);
  --tag-finance-bg:rgba(0,80,180,0.12);--tag-high-bg:rgba(200,0,60,0.12);
  --tag-med-bg:rgba(180,120,0,0.12);--tag-low-bg:rgba(0,120,80,0.12);
  --red:#cc2244;--amber:#996600;--teal:#005533;--blue:#0055aa;--purple:#6600bb;--pink:#bb0066;--orange:#885500;
  --bg:#eef5f0;--bg2:#ffffff;--bg3:#dff0e4;--bg4:#cfe8d6;--bg5:#bfe0c8;
  --border:rgba(40,120,60,0.12);--border2:rgba(40,120,60,0.24);
  --text:#0a2e14;--text2:#3a8050;--text3:#88bb99;
  --accent:#1a7a35;--accent2:rgba(26,122,53,0.1);--accent3:rgba(26,122,53,0.22);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;transition:background .3s,color .3s}
#app{height:100%;display:flex;flex-direction:column;max-width:520px;margin:0 auto;position:relative}
#auth-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;z-index:1000}
.auth-logo{font-size:52px;margin-bottom:8px}
.auth-title{font-size:34px;font-weight:600;letter-spacing:-1px;margin-bottom:4px;color:var(--accent)}
.auth-sub{font-size:14px;color:var(--text2);margin-bottom:32px}
.auth-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2);padding:24px;width:100%;max-width:360px}
.auth-tabs{display:flex;margin-bottom:20px;background:var(--bg3);border-radius:var(--r);padding:3px}
.auth-tab{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:500;border-radius:9px;cursor:pointer;color:var(--text2);border:none;background:none;font-family:var(--font);transition:all .2s}
.auth-tab.active{background:var(--bg5);color:var(--text)}
.auth-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;font-size:14px;color:var(--text);font-family:var(--font);outline:none;margin-bottom:10px}
.auth-input:focus{border-color:var(--accent)}
.auth-input::placeholder{color:var(--text3)}
.auth-btn{width:100%;background:var(--accent);color:var(--bg);border:none;border-radius:var(--r);padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font);margin-top:4px}
.auth-err{font-size:12px;color:var(--red);margin-top:8px;text-align:center;min-height:16px}
#main{display:flex;flex-direction:column;height:100%;opacity:0;transition:opacity .3s}
#main.ready{opacity:1}
.page{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 16px 92px;display:none}
.page::-webkit-scrollbar{display:none}
.page.active{display:block}
.nav{position:absolute;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;padding:8px 0 max(16px,env(safe-area-inset-bottom));z-index:50}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px;background:none;border:none;font-family:var(--font)}
.nav-icon{font-size:20px;opacity:0.3;transition:all .2s}
.nav-label{font-size:9px;color:var(--text3);letter-spacing:.5px;font-weight:500;text-transform:uppercase}
.nav-btn.active .nav-icon{opacity:1;transform:translateY(-2px)}
.nav-btn.active .nav-label{color:var(--accent)}
.hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;padding-top:4px}
.hdr h1{font-size:24px;font-weight:600;letter-spacing:-.5px}
.hdr p{font-size:12px;color:var(--text2);margin-top:3px}
.hdr-actions{display:flex;gap:8px}
.icon-btn{width:36px;height:36px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin-bottom:12px}
.card-title{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);margin-bottom:12px;font-weight:500}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 8px;text-align:center}
.stat-num{font-size:22px;font-weight:600;font-family:var(--mono);color:var(--accent);line-height:1}
.stat-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.mood-row{display:flex;gap:6px}
.mood-btn{flex:1;border-radius:10px;background:var(--bg3);border:1px solid var(--border);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:10px 4px;transition:all .15s}
.mood-btn.sel{border-color:var(--accent);background:var(--accent2);transform:scale(1.08)}
.inp{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;font-size:14px;color:var(--text);font-family:var(--font);outline:none;width:100%}
.inp:focus{border-color:var(--accent)}
.inp::placeholder{color:var(--text3)}
select.inp option{background:var(--bg2)}
.filter-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px}
.chip{font-size:11px;padding:5px 12px;border-radius:20px;cursor:pointer;border:1px solid var(--border);color:var(--text2);background:var(--bg3);font-family:var(--font);white-space:nowrap;transition:all .15s}
.chip.active{border-color:transparent;font-weight:500}
.chip[data-cat="Work"].active{background:#0d2a4a;color:var(--blue)}
.chip[data-cat="Business"].active{background:#0a2a1a;color:var(--teal)}
.chip[data-cat="Personal"].active{background:#220d3d;color:var(--purple)}
.chip[data-cat="Lifestyle"].active{background:#3d0a2a;color:var(--pink)}
.chip[data-cat="Chores"].active{background:#2a1800;color:var(--amber)}
.chip[data-cat="Health"].active{background:#0a2a1a;color:var(--teal)}
.chip[data-cat="Finance"].active{background:#0d2a4a;color:var(--blue)}
.chip[data-cat="Other"].active{background:var(--bg4);color:var(--text)}
.chip[data-prio="high"].active{background:#3d0a15;color:var(--red)}
.chip[data-prio="med"].active{background:#2a1800;color:var(--amber)}
.chip[data-prio="low"].active{background:#0a2a1a;color:var(--teal)}
.chip.all-active{background:var(--accent2);color:var(--accent);border-color:var(--accent3)}
.task-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.task-item:last-child{border-bottom:none}
.task-cb{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border2);flex:0 0 22px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .2s;margin-top:1px}
.task-item.done .task-cb{background:var(--accent);border-color:var(--accent);color:var(--bg)}
.task-item.done .task-text{text-decoration:line-through;color:var(--text3)}
.task-body{flex:1;min-width:0;cursor:pointer}
.task-text{font-size:14px;line-height:1.4}
.task-meta{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.tag{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500}
.tag-Work{background:var(--tag-work-bg,#0d2a4a);color:var(--blue)}
.tag-Business{background:var(--tag-biz-bg,#0a2a1a);color:var(--teal)}
.tag-Personal{background:var(--tag-personal-bg,#220d3d);color:var(--purple)}
.tag-Lifestyle{background:var(--tag-lifestyle-bg,#3d0a2a);color:var(--pink)}
.tag-Chores{background:var(--tag-chores-bg,#2a1800);color:var(--amber)}
.tag-Health{background:var(--tag-health-bg,#0a2a1a);color:var(--teal)}
.tag-Finance{background:var(--tag-finance-bg,#0d2a4a);color:var(--blue)}
.tag-Other{background:var(--bg4);color:var(--text2)}
.tag-high{background:var(--tag-high-bg,#3d0a15);color:var(--red)}
.tag-med{background:var(--tag-med-bg,#2a1800);color:var(--amber)}
.tag-low{background:var(--tag-low-bg,#0a2a1a);color:var(--teal)}
.tag-repeat{background:var(--bg4);color:var(--text2)}
.task-del{background:none;border:none;color:var(--text3);font-size:14px;cursor:pointer;flex:0 0 auto;padding:2px;margin-top:2px}
.prog-wrap{margin:10px 0 4px}
.prog-bar{height:5px;background:var(--bg4);border-radius:20px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--accent));border-radius:20px;transition:width .6s}
.prog-lbl{font-size:11px;color:var(--text2);margin-top:4px}
.habit-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.habit-item:last-child{border-bottom:none}
.habit-ring-wrap{position:relative;width:44px;height:44px;flex:0 0 44px}
.habit-ring-wrap svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)}
.habit-ring-bg{fill:none;stroke:var(--bg4);stroke-width:4}
.habit-ring-fill{fill:none;stroke:var(--accent);stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset .4s}
.habit-ring-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:18px}
.habit-body{flex:1;min-width:0}
.habit-name{font-size:14px;font-weight:500}
.habit-pct-row{display:flex;align-items:center;gap:8px;margin-top:4px}
.habit-pct-lbl{font-size:11px;color:var(--accent);font-family:var(--mono);font-weight:500;min-width:32px}
.habit-slider{flex:1;appearance:none;height:4px;border-radius:20px;background:var(--bg4);outline:none;cursor:pointer}
.habit-slider::-webkit-slider-thumb{appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer}
.habit-streak{font-size:11px;color:var(--text2);margin-top:2px}
.habit-streak b{color:var(--orange)}
.goal-item{padding:12px 0;border-bottom:1px solid var(--border)}
.goal-item:last-child{border-bottom:none}
.goal-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.goal-name{font-size:14px;font-weight:500}
.goal-date{font-size:11px;color:var(--text2)}
.log-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.log-box{background:var(--bg3);border-radius:var(--r);padding:12px;border:1px solid var(--border)}
.log-lbl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.log-inp{background:none;border:none;font-size:22px;font-family:var(--mono);color:var(--text);font-weight:600;width:100%;outline:none;padding:0}
.log-unit{font-size:10px;color:var(--text3);margin-top:2px}
.pom-wrap{display:flex;flex-direction:column;align-items:center;padding:8px 0}
.pom-ring{width:180px;height:180px;position:relative;margin-bottom:20px}
.pom-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.pom-track{fill:none;stroke:var(--bg4);stroke-width:8}
.pom-arc{fill:none;stroke:var(--accent);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .8s linear}
.pom-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.pom-time{font-size:38px;font-family:var(--mono);font-weight:500;letter-spacing:-1px}
.pom-phase{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.btn{padding:10px 22px;border-radius:var(--r2);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);border:none;transition:all .15s}
.btn-accent{background:var(--accent);color:var(--bg)}
.btn-ghost{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn-sm{padding:8px 16px;font-size:13px;border-radius:var(--r)}
.btn-full{width:100%;margin-top:8px}
.wt-chart{height:80px;margin-top:8px}
.wt-chart svg{width:100%;height:100%}
.motive{border-radius:var(--r);padding:12px 14px;margin-bottom:12px;border:1px solid}
.motive-text{font-size:14px;font-weight:500;line-height:1.4}
.meme-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;transition:opacity .3s;pointer-events:none}
.meme-overlay.show{opacity:1;pointer-events:all}
.meme-box{background:var(--bg2);border-radius:var(--r2);overflow:hidden;max-width:320px;width:100%;border:2px solid var(--accent)}
.meme-img-wrap{width:100%;height:220px;display:flex;align-items:center;justify-content:center;background:var(--bg3);overflow:hidden}
.meme-img-wrap img{width:100%;height:100%;object-fit:cover}
.meme-caption-wrap{padding:14px 16px 16px;text-align:center}
.meme-caption{font-size:17px;font-weight:700;margin-bottom:4px}
.meme-sub{font-size:13px;color:var(--text2);margin-bottom:14px}
.meme-close{background:var(--accent);color:var(--bg);border:none;border-radius:var(--r);padding:10px 24px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);width:100%}
.sheet{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:300;display:flex;align-items:flex-end;justify-content:center;opacity:0;transition:opacity .2s;pointer-events:none}
.sheet.open{opacity:1;pointer-events:all}
.sheet-body{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2) var(--r2) 0 0;padding:20px 20px 36px;width:100%;max-width:520px;transform:translateY(20px);transition:transform .25s;max-height:90vh;overflow-y:auto;position:relative}
.sheet.open .sheet-body{transform:translateY(0)}
.sheet-title{font-size:17px;font-weight:600;margin-bottom:16px}
.sheet-close{position:absolute;top:16px;right:16px;background:var(--bg3);border:none;color:var(--text2);width:30px;height:30px;border-radius:50%;font-size:16px;cursor:pointer}
.sheet-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px;margin-top:12px}
.pill-grid{display:flex;gap:5px;flex-wrap:wrap}
.s-pill{font-size:12px;padding:6px 13px;border-radius:20px;cursor:pointer;border:1px solid var(--border);color:var(--text2);background:var(--bg3);font-family:var(--font);transition:all .15s}
.s-pill.sel{border-color:transparent;font-weight:500}
.s-pill[data-v="Work"].sel{background:#0d2a4a;color:var(--blue)}
.s-pill[data-v="Business"].sel{background:#0a2a1a;color:var(--teal)}
.s-pill[data-v="Personal"].sel{background:#220d3d;color:var(--purple)}
.s-pill[data-v="Lifestyle"].sel{background:#3d0a2a;color:var(--pink)}
.s-pill[data-v="Chores"].sel{background:#2a1800;color:var(--amber)}
.s-pill[data-v="Health"].sel{background:#0a2a1a;color:var(--teal)}
.s-pill[data-v="Finance"].sel{background:#0d2a4a;color:var(--blue)}
.s-pill[data-v="Other"].sel{background:var(--bg4);color:var(--text)}
.s-pill[data-v="high"].sel{background:#3d0a15;color:var(--red)}
.s-pill[data-v="med"].sel{background:#2a1800;color:var(--amber)}
.s-pill[data-v="low"].sel{background:#0a2a1a;color:var(--teal)}
.s-pill[data-v="none"].sel,.s-pill[data-v="daily"].sel,.s-pill[data-v="weekly"].sel{background:var(--accent2);color:var(--accent)}
.friend-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:14px;margin-bottom:10px}
.friend-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.friend-avatar{width:44px;height:44px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:22px;flex:0 0 44px;border:2px solid var(--border2)}
.friend-info{flex:1;min-width:0}
.friend-name{font-size:15px;font-weight:500}
.friend-status{font-size:12px;color:var(--text2);margin-top:2px}
.friend-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.friend-stat{background:var(--bg3);border-radius:var(--r);padding:8px 10px}
.friend-stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.friend-stat-val{font-size:15px;font-weight:600;font-family:var(--mono)}
.friend-code-box{background:var(--bg3);border-radius:var(--r);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border:1px solid var(--border)}
.friend-code{font-family:var(--mono);font-size:20px;font-weight:500;letter-spacing:3px;color:var(--accent)}
.chat-wrap{display:flex;flex-direction:column;gap:10px;margin-bottom:12px;min-height:80px}
.msg{max-width:88%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5}
.msg.ai{background:var(--bg3);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:4px}
.msg.user{background:var(--accent);color:var(--bg);align-self:flex-end;border-bottom-right-radius:4px;font-weight:500}
.msg.limit{background:#2a1800;border:1px solid var(--amber);align-self:flex-start;color:var(--amber)}
.chat-bottom{display:flex;gap:8px;align-items:flex-end}
.chat-inp{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:10px 14px;font-size:14px;color:var(--text);font-family:var(--font);outline:none;resize:none;max-height:100px;line-height:1.4}
.chat-inp:focus{border-color:var(--accent)}
.chat-send{background:var(--accent);color:var(--bg);border:none;border-radius:50%;width:40px;height:40px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:0 0 40px}
.typing span{width:5px;height:5px;background:var(--text3);border-radius:50%;display:inline-block;animation:bounce .9s infinite;margin:0 2px}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
.week-strip{display:flex;gap:6px;margin-bottom:12px}
.week-day{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 3px;border-radius:var(--r);background:var(--bg3);border:1px solid var(--border);cursor:pointer}
.week-day.today{background:var(--accent2);border-color:var(--accent3)}
.week-day-name{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px}
.week-day-num{font-size:15px;font-weight:500;font-family:var(--mono)}
.week-day.today .week-day-num{color:var(--accent)}
.week-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);opacity:0}
.week-day.has-tasks .week-dot{opacity:1}
.month-hdr-row{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px}
.month-hdr-cell{font-size:9px;text-align:center;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;padding:4px 0}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-cell{aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;font-family:var(--mono);color:var(--text2);background:var(--bg3);cursor:pointer;position:relative}
.cal-cell.today{background:var(--accent);color:var(--bg);font-weight:600}
.cal-cell.has-tasks::after{content:"";width:3px;height:3px;background:var(--accent);border-radius:50%;position:absolute;bottom:3px}
.cal-cell.today::after{background:var(--bg)}
.cal-cell.empty{background:none;cursor:default}
.cal-mood{font-size:8px;line-height:1}
.emoji-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:8px}
.emoji-opt{font-size:22px;text-align:center;cursor:pointer;padding:6px;border-radius:8px;transition:background .15s}
.emoji-opt:hover,.emoji-opt.sel{background:var(--bg4)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;transition:opacity .2s;pointer-events:none}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2) var(--r2) 0 0;padding:24px 20px 36px;width:100%;max-width:520px;transform:translateY(20px);transition:transform .25s;max-height:85vh;overflow-y:auto;position:relative}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-title{font-size:18px;font-weight:600;margin-bottom:16px}
.modal-close{position:absolute;top:16px;right:16px;background:var(--bg3);border:none;color:var(--text2);width:30px;height:30px;border-radius:50%;font-size:16px;cursor:pointer}
.theme-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:4px}
.theme-btn{padding:10px 6px;border-radius:var(--r);border:2px solid var(--border);cursor:pointer;font-size:11px;font-family:var(--font);font-weight:500;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .15s}
.theme-btn.active{border-color:var(--accent)}
.theme-dot{width:20px;height:20px;border-radius:50%}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-10px);background:var(--accent);color:var(--bg);padding:10px 20px;border-radius:var(--r2);font-size:13px;font-weight:700;z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
.setting-row:last-child{border-bottom:none}
.setting-lbl{font-size:14px}
.setting-sub{font-size:11px;color:var(--text2);margin-top:2px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);display:inline-block;margin-right:5px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.empty{text-align:center;padding:24px 0;color:var(--text3);font-size:13px}
.empty-icon{font-size:28px;margin-bottom:6px;opacity:.4}
</style>
</head>

<div id="app">
  <div id="auth-screen">
    <div class="auth-logo">🌿</div>
    <div class="auth-title">Flow</div>
    <div class="auth-sub">Your life, organised</div>
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">Sign in</button>
        <button class="auth-tab" id="tab-signup" onclick="switchAuthTab('signup')">Create account</button>

      <div id="auth-login">
        <input class="auth-input" type="email" id="login-email" placeholder="Email address" autocomplete="email">
        <input class="auth-input" type="password" id="login-pass" placeholder="Password" autocomplete="current-password">
        <button class="auth-btn" id="login-btn">Sign in</button>
      </div>
      <div id="auth-signup" style="display:none">
        <input class="auth-input" type="text" id="signup-name" placeholder="Your name">
        <input class="auth-input" type="email" id="signup-email" placeholder="Email address" autocomplete="email">
        <input class="auth-input" type="password" id="signup-pass" placeholder="Password (min 6 chars)" autocomplete="new-password">
        <button class="auth-btn" id="signup-btn">Create account</button>
      </div>
      <div class="auth-err" id="auth-err"></div>
    </div>
  </div>
  <div id="main">
    <div class="page active" id="page-today"></div>
    <div class="page" id="page-week"></div>
    <div class="page" id="page-month"></div>
    <div class="page" id="page-friends"></div>
    <div class="page" id="page-more"></div>
    <nav class="nav">
      <button class="nav-btn active" data-page="today" onclick="showPage("today")"><span class="nav-icon">☀️</span><span class="nav-label">Today</span></button>
      <button class="nav-btn" data-page="week" onclick="showPage('week')"><span class="nav-icon">📅</span><span class="nav-label">Week</span></button>
      <button class="nav-btn" data-page="month" onclick="showPage('month')"><span class="nav-icon">🗓</span><span class="nav-label">Month</span></button>
      <button class="nav-btn" data-page="friends" onclick="showPage("friends")"><span class="nav-icon">👥</span><span class="nav-label">Friends</span></button>
      <button class="nav-btn" data-page="more" onclick="showPage('more')"><span class="nav-icon">⚙️</span><span class="nav-label">More</span></button>
    </nav>
  </div>
  <div class="sheet" id="task-sheet" onclick="closeSheetBg(event)">
    <div class="sheet-body">
      <button class="sheet-close" onclick="closeTaskSheet()">✕</button>
      <div class="sheet-title" id="sheet-title">Add task</div>
      <textarea class="inp" id="sheet-task-text" placeholder="What needs to be done?" rows="2" style="resize:none;line-height:1.5;margin-bottom:4px"></textarea>
      <div class="sheet-label">Category</div>
      <div class="pill-grid" id="sheet-cats"></div>
      <div id="other-wrap" style="display:none;margin-top:8px">
        <input class="inp" id="other-cat-inp" placeholder="Custom category..." style="font-size:13px;padding:8px 12px">
      </div>
      <div class="sheet-label">Priority</div>
      <div class="pill-grid" id="sheet-prios"></div>
      <div class="sheet-label">Repeat</div>
      <div class="pill-grid" id="sheet-repeats"></div>
      <button class="btn btn-accent btn-full" onclick="submitTask()" style="margin-top:16px" id="sheet-submit-btn">Add task</button>
      <button class="btn btn-ghost btn-full" id="sheet-delete-btn" style="display:none;margin-top:6px;color:var(--red)" onclick="deleteEditingTask()">Delete task</button>
    </div>
  </div>
  <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
    <div class="modal">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div id="modal-body"></div>
    </div>
  </div>
  <div class="toast" id="toast"></div>
</div>
<div class="meme-overlay" id="meme-overlay" onclick="closeMeme()">

  </div>
</div>

  document.getElementById('tab-login').classList.toggle('active', tab === 'login');

  document.getElementById('auth-login').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('auth-signup').style.display = tab === 'signup' ? '' : 'none';
  document.getElementById('auth-err').textContent = '';
}

function applyTheme(t) { document.documentElement.setAttribute('data-theme', t || 'dark'); }

// ── Auth functions ──
function doLogin() {
  var email = document.getElementById('login-email').value.trim();
  var pass = document.getElementById('login-pass').value;
  var err = document.getElementById('auth-err');
  err.textContent = '';
  if (!auth) { err.textContent = 'Still loading - try again in a moment'; return; }
  auth.signInWithEmailAndPassword(email, pass)
    .catch(function(e) { err.textContent = (e.code === 'auth/invalid-credential' || e.code === 'auth/wrong-password') ? 'Wrong email or password' : e.message; });
}
function doSignup() {
  var name = document.getElementById('signup-name').value.trim();
  var email = document.getElementById('signup-email').value.trim();
  var pass = document.getElementById('signup-pass').value;
  var err = document.getElementById('auth-err');
  err.textContent = '';
  if (!name) { err.textContent = 'Please enter your name'; return; }
  if (!auth || !db) { err.textContent = 'Still loading - try again in a moment'; return; }
  auth.createUserWithEmailAndPassword(email, pass).then(function(cred) {
    var code = genCode();
    db.collection('users').doc(cred.user.uid).set({
      uid: cred.user.uid, displayName: name, avatar: '🌿',
      status: 'Staying focused 💪', friendCode: code, friends: [],
      taskPct: 0, mood: null, createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    return db.collection('data').doc(cred.user.uid).set({
      tasks: [], habits: [
        {id:'h1',name:'Drink Water',icon:'💧',streak:0,pct:0,lastReset:''},
        {id:'h2',name:'Exercise',icon:'🏃',streak:0,pct:0,lastReset:''},
        {id:'h3',name:'Read',icon:'📚',streak:0,pct:0,lastReset:''},
      ], goals: [], healthLog: {}, weightLog: [], moodLog: {},
      weightTarget: '', chatMessages: [], apiKey: '', theme: 'dark',
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  }).catch(function(e) {
    err.textContent = e.code === 'auth/email-already-in-use' ? 'Email already in use' : e.message;
  });
}
function doSignout() {
  if (dataListener) { dataListener(); dataListener = null; }
  friendListeners.forEach(function(u) { u(); }); friendListeners = [];
  if (pomInterval) clearInterval(pomInterval);
  auth.signOut();
}

// ── Firestore sync ──
function startDataListener() {
  if (dataListener) dataListener();
  dataListener = db.collection('data').doc(currentUser.uid).onSnapshot(function(snap) {
    if (!snap.exists) return;
    var d = snap.data();
    var keep = {pomState:S.pomState, activePage:S.activePage, friendData:S.friendData, filterCat:S.filterCat, filterPrio:S.filterPrio};
    S = Object.assign({}, S, d, keep);
    applyTheme(S.theme || 'dark');
    // Reset habits to 0% if new day
    var today = todayKey();
    S.habits.forEach(function(h) {
      if (h.lastReset !== today) { h.pct = 0; }
    });
    renderCurrent();
  });
}

function scheduleSave() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(pushSave, 600);
}

function pushSave() {
  if (!currentUser) return;
  var today = todayKey();
  var todayTasks = S.tasks.filter(function(t) { return t.repeat !== 'none' || !t.done; });
  var dayTasks = todayTasks.filter(function(t) {
    if (t.repeat === 'daily') return true;
    if (t.repeat === 'weekly') return new Date().getDay() === new Date(t.date + 'T12:00:00').getDay();
    return t.date === today;
  });
  var pct = dayTasks.length ? Math.round(dayTasks.filter(function(t){return t.done;}).length / dayTasks.length * 100) : 0;
  db.collection('data').doc(currentUser.uid).update({
    tasks: S.tasks, habits: S.habits, goals: S.goals,
    healthLog: S.healthLog, weightLog: S.weightLog, moodLog: S.moodLog,
    weightTarget: S.weightTarget, chatMessages: S.chatMessages.slice(-40),
    apiKey: S.apiKey, theme: S.theme || 'dark',
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  }).catch(function(e){ console.error(e); });
  db.collection('users').doc(currentUser.uid).update({
    taskPct: pct, mood: S.moodLog[today] !== undefined ? S.moodLog[today] : null,
    lastSeen: firebase.firestore.FieldValue.serverTimestamp()
  }).catch(function(e){ console.error(e); });
}

// ── Friends ──
function setupFriendListeners() {
  if (!userProfile) return;
  (userProfile.friends || []).forEach(function(fuid) {
    var u = db.collection('users').doc(fuid).onSnapshot(function(s) {
      if (s.exists) { S.friendData[fuid] = s.data(); if (S.activePage === 'friends') renderFriends(); }
    });
    friendListeners.push(u);
  });
}
function addFriend() {
  var code = document.getElementById('friend-code-input').value.trim().toUpperCase();
  if (!code) return;
  if (code === userProfile.friendCode) { showToast('That is your own code!'); return; }
  db.collection('users').where('friendCode','==',code).get().then(function(snap) {
    if (snap.empty) { showToast('Code not found 🤔'); return; }
    var fd = snap.docs[0]; var fuid = fd.id;
    if ((userProfile.friends||[]).indexOf(fuid) > -1) { showToast('Already friends!'); return; }
    var nf = (userProfile.friends||[]).concat([fuid]);
    userProfile.friends = nf;
    db.collection('users').doc(currentUser.uid).update({friends: nf});
    S.friendData[fuid] = fd.data();
    var u = db.collection('users').doc(fuid).onSnapshot(function(s) {
      if (s.exists) { S.friendData[fuid] = s.data(); if (S.activePage === 'friends') renderFriends(); }
    });
    friendListeners.push(u);
    showToast('Friend added! 🎉'); closeModal(); renderFriends();
  });
}
function removeFriend(fuid) {
  userProfile.friends = (userProfile.friends||[]).filter(function(f){return f!==fuid;});
  db.collection('users').doc(currentUser.uid).update({friends: userProfile.friends});
  delete S.friendData[fuid]; renderFriends(); showToast('Removed');
}

// ── Routing ──
function showPage(page) {
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.toggle('active',b.dataset.page===page);});
  document.getElementById('page-'+page).classList.add('active');
  S.activePage = page; renderPage(page);
}
function renderCurrent() { renderPage(S.activePage || 'today'); }
function renderPage(p) {
  if (p==='today') renderToday();
  else if (p==='week') renderWeek();
  else if (p==='month') renderMonth();
  else if (p==='friends') renderFriends();
  else if (p==='more') renderMore();
}

// ── Memes ──
function showMeme(type, moodIdx) {
  try {
    var m;
    if (type === 'mood') {
      var pool = MEMES_MOOD[parseInt(moodIdx)] || MEMES_MOOD[2];
      m = pool[Math.floor(Math.random() * pool.length)];
    } else {
      var pool = type === 'done' ? MEMES_DONE : MEMES_UNDONE;
      m = pool[Math.floor(Math.random() * pool.length)];
    }
    if (!m) return;
    var imgSrc = MEME_IMGS[m.img];
    if (!imgSrc) return;
    var wrap = document.getElementById('meme-img-wrap');
    var cap = document.getElementById('meme-caption');
    var sub = document.getElementById('meme-sub');
    var ov = document.getElementById('meme-overlay');
    if (!wrap || !ov) return;
    wrap.innerHTML = '';
    var img = document.createElement('img');
    img.src = imgSrc;
    img.style.width = '100%';
    img.style.height = '100%';
    img.style.objectFit = 'cover';
    wrap.appendChild(img);
    if (cap) cap.textContent = m.caption;
    if (sub) sub.textContent = m.sub;
    ov.classList.add('show');
    clearTimeout(window._memeTimer);
    window._memeTimer = setTimeout(function(){ ov.classList.remove('show'); }, 4000);
  } catch(e) { console.error('showMeme error:', e); }
}

function closeMeme() { document.getElementById('meme-overlay').classList.remove('show'); }

function taskHTML(t) {
  var doneClass = t.done ? ' done' : '';
  var cbContent = t.done ? '✓' : '';
  var repeatTag = t.repeat !== 'none' ? '<span class="tag tag-repeat">🔁 '+t.repeat+'</span>' : '';
  var el = document.createElement('div');
  el.className = 'task-item' + doneClass;
  el.innerHTML = '<div class="task-cb">'+cbContent+'</div>' +
    '<div class="task-body"><div class="task-text">'+t.text+'</div>' +
    '<div class="task-meta"><span class="tag tag-'+t.cat+'">'+t.cat+'</span><span class="tag tag-'+t.prio+'">'+t.prio+'</span>'+repeatTag+'</div></div>' +
    '<button class="task-del">✕</button>';
  el.querySelector('.task-cb').onclick = function() { toggleTask(t.id); };
  el.querySelector('.task-body').onclick = function() { openTaskSheet(t.id); };
  el.querySelector('.task-del').onclick = function() { quickDeleteTask(t.id); };
  var tmp = document.createElement('div');
  tmp.appendChild(el);
  return tmp.innerHTML;
}

function habitHTML(h) {
  var pct = h.pct || 0;
  var r = 18, circ = 2 * Math.PI * r;
  var offset = circ * (1 - pct/100);
  var el = document.createElement('div');
  el.className = 'habit-item';
  el.innerHTML = '<div class="habit-ring-wrap"><svg viewBox="0 0 44 44"><circle class="habit-ring-bg" cx="22" cy="22" r="'+r+'"/><circle class="habit-ring-fill" cx="22" cy="22" r="'+r+'" stroke-dasharray="'+circ+'" stroke-dashoffset="'+offset+'"/></svg><div class="habit-ring-icon">'+h.icon+'</div></div>' +
    '<div class="habit-body"><div class="habit-name">'+h.name+'</div>' +
    '<div class="habit-pct-row"><span class="habit-pct-lbl" id="hpct-'+h.id+'">'+pct+'%</span>' +
    '<input type="range" class="habit-slider" min="0" max="100" step="5" value="'+pct+'"></div>' +
    '<div class="habit-streak">🔥 <b>'+h.streak+'</b> day streak</div></div>' +
    '<button class="task-del">✕</button>';
  var slider = el.querySelector('.habit-slider');
  slider.oninput = function() { updateHabitPct(h.id, this.value, this); };
  el.querySelector('.task-del').onclick = function() { deleteHabitInline(h.id); };
  var tmp = document.createElement('div');
  tmp.appendChild(el);
  return tmp.innerHTML;
}

function goalHTML(g) {
  var now=new Date(), end=new Date(g.date+'T12:00:00'), start=new Date(g.created);
  var total=Math.max(1,(end-start)/86400000);
  var left=Math.max(0,Math.ceil((end-now)/86400000));
  var pct=Math.min(100,Math.round((1-left/total)*100));
  var col=left<=3?'var(--red)':left<=7?'var(--amber)':'var(--accent)';
  var dueStr=new Date(g.date+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  var el = document.createElement('div');
  el.className = 'goal-item';
  el.innerHTML = '<div class="goal-top"><div><div class="goal-name">'+g.name+'</div><div class="goal-date">Due '+dueStr+'</div></div>' +
    '<div style="display:flex;align-items:center;gap:8px"><div style="text-align:right"><div style="font-family:var(--mono);font-size:22px;color:'+col+';font-weight:600">'+left+'</div><div style="font-size:10px;color:var(--text2)">days left</div></div>' +
    '<button class="task-del">✕</button></div></div>' +
    '<div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div>';
  el.querySelector('.task-del').onclick = function() { deleteGoal(g.id); };
  var tmp = document.createElement('div');
  tmp.appendChild(el);
  return tmp.innerHTML;
}

function wtChartHTML() {
  var entries = S.weightLog.slice(-14);
  if (entries.length < 2) return '<div style="font-size:12px;color:var(--text3);text-align:center;padding:10px 0;margin-top:8px">Log a few days to see your trend 📈</div>';
  var vals = entries.map(function(e){return e.kg;});
  var min = Math.min.apply(null,vals)-0.5, max = Math.max.apply(null,vals)+0.5;
  var w=300, h=70;
  var pts = vals.map(function(v,i){return ((i/(vals.length-1))*w)+','+(h-((v-min)/(max-min))*h);}).join(' ');
  var tgt = S.weightTarget ? h-((S.weightTarget-min)/(max-min))*h : null;
  var last=vals[vals.length-1], first=vals[0], diff=(last-first).toFixed(1);
  var col = parseFloat(diff)<0?'var(--teal)':parseFloat(diff)>0?'var(--red)':'var(--accent)';
  var dots = vals.map(function(v,i){return '<circle cx="'+((i/(vals.length-1))*w)+'" cy="'+(h-((v-min)/(max-min))*h)+'" r="3.5" fill="'+col+'"/>';}).join('');
  return '<div style="margin-top:10px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px"><span style="color:var(--text2)">Start: <b style="color:var(--text)">'+first+'kg</b></span><span style="color:'+col+';font-weight:600">'+(parseFloat(diff)>0?'+':'')+diff+'kg</span><span style="color:var(--text2)">Now: <b style="color:var(--text)">'+last+'kg</b></span></div>' +
    '<div class="wt-chart"><svg viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none">'+(tgt!==null?'<line x1="0" y1="'+tgt+'" x2="'+w+'" y2="'+tgt+'" stroke="var(--red)" stroke-width="1.5" stroke-dasharray="4,3"/>' : '')+'<polyline points="'+pts+'" fill="none" stroke="'+col+'" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>'+dots+'</svg></div>'+(tgt!==null?'<div style="font-size:11px;color:var(--red);margin-top:2px">— target '+S.weightTarget+'kg</div>':'')+'</div>';
}

function getMotive(pct, total) {
  if (!total) return '<div class="motive" style="background:var(--accent2);border-color:var(--accent3)"><div class="motive-text" style="color:var(--accent)">Fresh start - what is the plan? 🌱</div></div>';
  var cfgs = [
    [0,  'var(--red)',   'rgba(255,77,109,.08)',  'rgba(255,77,109,.2)',  'One task at a time. You have got this 💪'],
    [25, 'var(--orange)','rgba(255,124,67,.08)',  'rgba(255,124,67,.2)',  'Good start - momentum is building 🚀'],
    [50, 'var(--amber)', 'rgba(255,190,11,.08)',  'rgba(255,190,11,.2)',  'Past halfway - the finish line is close 🏁'],
    [75, 'var(--teal)',  'rgba(6,214,160,.08)',   'rgba(6,214,160,.2)',   'Almost there - do not stop now! 🔥'],
    [100,'var(--accent)','var(--accent2)',         'var(--accent3)',        'EVERYTHING DONE! Absolute legend 🌟'],
  ];
  var c = cfgs[0];
  for (var i = cfgs.length-1; i >= 0; i--) { if (pct >= cfgs[i][0]) { c = cfgs[i]; break; } }
  return '<div class="motive" style="background:'+c[2]+';border-color:'+c[3]+'"><div class="motive-text" style="color:'+c[1]+'">'+c[4]+'</div></div>';
}

function updateHabitPct(id, val, slider) {
  var h = S.habits.find(function(h){return h.id===id;});
  if (!h) return;
  var prev = h.pct || 0;
  h.pct = parseInt(val);
  var el = document.getElementById('hpct-'+id);
  if (el) el.textContent = val + '%';
  // Update ring
  var ring = slider ? slider.parentElement.parentElement.parentElement.querySelector('.habit-ring-fill') : null;
  if (ring) {
    var r=18, circ=2*Math.PI*r;
    ring.style.strokeDashoffset = circ*(1-h.pct/100);
  }
  var today = todayKey();
  if (h.pct >= 80 && prev < 80 && h.lastReset !== today) {
    h.streak = (h.streak||0)+1; h.lastReset = today;
    setTimeout(function(){ showMeme('done'); }, 50);
  }
  if (h.pct < 80 && prev >= 80 && h.lastReset === today) {
    h.streak = Math.max(0,(h.streak||0)-1); h.lastReset = '';
  }
  scheduleSave();
}

// ── Pomodoro ──
function openPomodoro() {
  var ps = S.pomState;
  var total = ps.phase==='work' ? ps.workMins*60 : ps.breakMins*60;
  var r=80, circ=2*Math.PI*r, offset=circ*(1-ps.timeLeft/total);
  var mins = String(Math.floor(ps.timeLeft/60)).padStart(2,'0');
  var secs = String(ps.timeLeft%60).padStart(2,'0');
  openModal('<div class="modal-title">Pomodoro 🍅</div>' +
    '<div class="pom-wrap"><div class="pom-ring">' +
    '<svg viewBox="0 0 200 200"><circle class="pom-track" cx="100" cy="100" r="'+r+'"/><circle class="pom-arc" id="pom-arc" cx="100" cy="100" r="'+r+'" stroke-dasharray="'+circ+'" stroke-dashoffset="'+offset+'"/></svg>' +
    '<div class="pom-center"><div class="pom-time" id="pom-time">'+mins+':'+secs+'</div><div class="pom-phase" id="pom-phase">'+(ps.phase==='work'?'Focus':'Break')+'</div></div></div>' +
    '<div style="display:flex;gap:10px"><button class="btn btn-accent" id="pom-start" onclick="togglePom()">'+(ps.running?'Pause ⏸':'Start ▶')+'</button><button class="btn btn-ghost" onclick="resetPom()">Reset</button></div>' +
    '<div style="display:flex;gap:12px;margin-top:16px;align-items:center"><label style="font-size:12px;color:var(--text2);min-width:36px">Focus</label><input type="range" min="5" max="60" step="5" value="'+ps.workMins+'" oninput="setPomWork(this.value)" style="flex:1"><span style="font-size:12px;font-family:var(--mono);min-width:28px" id="pom-wlbl">'+ps.workMins+'m</span></div>' +
    '<div style="display:flex;gap:12px;margin-top:8px;align-items:center"><label style="font-size:12px;color:var(--text2);min-width:36px">Break</label><input type="range" min="1" max="30" step="1" value="'+ps.breakMins+'" oninput="setPomBreak(this.value)" style="flex:1"><span style="font-size:12px;font-family:var(--mono);min-width:28px" id="pom-blbl">'+ps.breakMins+'m</span></div></div>');
  if (ps.running && !pomInterval) pomInterval = setInterval(tickPom, 1000);
}
function togglePom() { S.pomState.running=!S.pomState.running; if(S.pomState.running){pomInterval=setInterval(tickPom,1000);}else{clearInterval(pomInterval);pomInterval=null;} document.getElementById('pom-start').textContent=S.pomState.running?'Pause ⏸':'Start ▶'; }
function tickPom() { S.pomState.timeLeft--; if(S.pomState.timeLeft<=0){clearInterval(pomInterval);pomInterval=null;S.pomState.running=false;S.pomState.phase=S.pomState.phase==='work'?'break':'work';S.pomState.timeLeft=S.pomState.phase==='work'?S.pomState.workMins*60:S.pomState.breakMins*60;showToast(S.pomState.phase==='break'?'Break time! 🎉':'Back to focus 🎯');} updatePomDisplay(); }
function updatePomDisplay() { var ps=S.pomState,el=document.getElementById('pom-time'),arc=document.getElementById('pom-arc'),ph=document.getElementById('pom-phase'); if(el)el.textContent=String(Math.floor(ps.timeLeft/60)).padStart(2,'0')+':'+String(ps.timeLeft%60).padStart(2,'0'); if(ph)ph.textContent=ps.phase==='work'?'Focus':'Break'; if(arc){var total=ps.phase==='work'?ps.workMins*60:ps.breakMins*60,r=80,circ=2*Math.PI*r;arc.style.strokeDashoffset=String(circ*(1-ps.timeLeft/total));} }
function resetPom() { clearInterval(pomInterval);pomInterval=null;S.pomState.running=false;S.pomState.phase='work';S.pomState.timeLeft=S.pomState.workMins*60;document.getElementById('pom-start').textContent='Start ▶';updatePomDisplay(); }
function setPomWork(v) { S.pomState.workMins=parseInt(v);if(!S.pomState.running&&S.pomState.phase==='work')S.pomState.timeLeft=parseInt(v)*60;document.getElementById('pom-wlbl').textContent=v+'m';updatePomDisplay(); }
function setPomBreak(v) { S.pomState.breakMins=parseInt(v);document.getElementById('pom-blbl').textContent=v+'m'; }

function sendChat() {
  var inp=document.getElementById('chat-inp'); var text=inp?inp.value.trim():'';
  if(!text||!S.apiKey)return; inp.value='';
  S.chatMessages.push({role:'user',content:text});

  var today=todayKey();

  fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+S.apiKey},body:JSON.stringify({model:'llama3-8b-8192',max_tokens:200,messages:[{role:'system',content:ctx}].concat(S.chatMessages.slice(-10).map(function(m){return {role:m.role==='ai'?'assistant':m.role==='limit'?'assistant':m.role,content:m.content};}))})})
  .then(function(res){return res.json().then(function(data){return {status:res.status,data:data};});})
  .then(function(r){

// ── Week ──
function renderWeek() {
  var today=new Date(),dow=today.getDay(),start=new Date(today);
  start.setDate(today.getDate()-(dow===0?6:dow-1));
  var days=[],dayL=['M','T','W','T','F','S','S'];
  for(var i=0;i<7;i++){var d=new Date(start);d.setDate(start.getDate()+i);days.push(d);}
  var todayStr=todayKey();
  var weekKeys=days.map(function(d){return d.toISOString().slice(0,10);});
  var weekTasks=S.tasks.filter(function(t){return weekKeys.indexOf(t.date)>-1||t.repeat==='daily';});
  var weekMoods=weekKeys.map(function(k){return S.moodLog[k];}).filter(function(m){return m!==undefined;});
  var avgMood=weekMoods.length?weekMoods.reduce(function(a,b){return a+b;},0)/weekMoods.length:null;
  var logs=weekKeys.map(function(k){return S.healthLog[k];}).filter(Boolean);
  var habitAvg=S.habits.length?Math.round(S.habits.reduce(function(a,h){return a+(h.pct||0);},0)/S.habits.length):0;

  var stripHTML=days.map(function(d,i){
    var key=d.toISOString().slice(0,10),isT=key===todayStr,hasTasks=S.tasks.some(function(t){return t.date===key||t.repeat==='daily';});
    var mood=S.moodLog[key];
    return '<div class="week-day'+(isT?' today':'')+(hasTasks?' has-tasks':'')+'" onclick="showPage("today")"><div class="week-day-name">'+dayL[i]+'</div><div class="week-day-num">'+d.getDate()+'</div>'+(mood!==undefined?'<div style="font-size:13px">'+MOODS[mood]+'</div>':'')+'<div class="week-dot"></div></div>';
  }).join('');

  var taskListHTML=days.map(function(d){
    var key=d.toISOString().slice(0,10),isT=key===todayStr,dt=S.tasks.filter(function(t){return t.date===key||t.repeat==='daily';});
    if(!dt.length)return'';
    return'<div style="margin-bottom:10px"><div style="font-size:11px;color:'+(isT?'var(--accent)':'var(--text3)')+';margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px">'+d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric'})+'</div>'+dt.slice(0,3).map(function(t){return'<div style="font-size:12px;padding:2px 0;color:'+(t.done?'var(--teal)':'var(--text2)')+';display:flex;gap:6px"><span>'+(t.done?'✓':'·')+'</span>'+t.text+'</div>';}).join('')+(dt.length>3?'<div style="font-size:11px;color:var(--text3)">+'+( dt.length-3)+' more</div>':'')+'</div>';
  }).join('');

  document.getElementById('page-week').innerHTML=
    '<div class="hdr"><div><h1>This week</h1><p>'+days[0].getDate()+' – '+days[6].getDate()+' '+days[6].toLocaleDateString('en-GB',{month:'short',year:'numeric'})+'</p></div></div>'+
    '<div class="stats-row"><div class="stat-box"><div class="stat-num">'+weekTasks.filter(function(t){return t.done;}).length+'/'+weekTasks.length+'</div><div class="stat-lbl">Tasks</div></div>'+
    '<div class="stat-box"><div class="stat-num">'+(avgMood!==null?MOODS[Math.round(avgMood)]:'–')+'</div><div class="stat-lbl">Avg mood</div></div>'+
    '<div class="stat-box"><div class="stat-num">'+habitAvg+'%</div><div class="stat-lbl">Habit avg</div></div></div>'+
    '<div class="card"><div class="card-title">Week at a glance</div><div class="week-strip">'+stripHTML+'</div>'+taskListHTML+'</div>'+
    '<div class="card"><div class="card-title">Habit progress</div>'+S.habits.map(function(h){return'<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><span style="font-size:18px">'+h.icon+'</span><div style="flex:1"><div style="font-size:13px;font-weight:500;margin-bottom:4px">'+h.name+'</div><div class="prog-bar"><div class="prog-fill" style="width:'+(h.pct||0)+'%"></div></div></div><span style="font-size:12px;font-family:var(--mono);color:var(--accent);min-width:32px;text-align:right">'+(h.pct||0)+'%</span></div>';}).join('')+'</div>'+
    '<div class="card"><div class="card-title">Weekly health averages</div>'+(!logs.length?'<div class="empty">No health data this week</div>':'<div class="stats-row" style="margin-bottom:0"><div class="stat-box"><div class="stat-num" style="font-size:16px">'+Math.round(logs.map(function(l){return parseFloat(l.steps)||0;}).reduce(function(a,b){return a+b;},0)/logs.length).toLocaleString()+'</div><div class="stat-lbl">Steps</div></div><div class="stat-box"><div class="stat-num" style="font-size:16px">'+Math.round(logs.map(function(l){return parseFloat(l.cals)||0;}).reduce(function(a,b){return a+b;},0)/logs.length)+'</div><div class="stat-lbl">Kcal</div></div><div class="stat-box"><div class="stat-num" style="font-size:16px">'+( logs.map(function(l){return parseFloat(l.sleep)||0;}).reduce(function(a,b){return a+b;},0)/logs.length).toFixed(1)+'h</div><div class="stat-lbl">Sleep</div></div></div>')+'</div>';
}

// ── Month ──
function buildCalGrid(cells,yr,mo,todayStr){
  var html='';
  for(var i=0;i<cells.length;i++){
    var d=cells[i];
    if(!d){html+='<div class="cal-cell empty"></div>';continue;}
    var key=yr+'-'+String(mo+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var hasTasks=S.tasks.some(function(t){return t.date===key;});
    var isToday=key===todayStr;
    var mood=S.moodLog[key];
    var moodH=mood!==undefined&&!isToday?'<div class="cal-mood">'+MOODS[mood]+'</div>':'';
    html+='<div class="cal-cell'+(isToday?' today':'')+(hasTasks?' has-tasks':'')+'" onclick="showPage("today")">'+d+moodH+'</div>';
  }
  return html;
}
function buildCatBreakdown(moTasks){
  if(!moTasks.length)return'<div class="empty">No tasks this month</div>';
  var byCat={};
  moTasks.forEach(function(t){byCat[t.cat]=(byCat[t.cat]||0)+1;});
  return Object.entries(byCat).map(function(e){var cat=e[0],count=e[1];return'<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><span class="tag tag-'+cat+'" style="min-width:68px;text-align:center">'+cat+'</span><div class="prog-bar" style="flex:1"><div class="prog-fill" style="width:'+Math.round(count/moTasks.length*100)+'%"></div></div><span style="font-size:12px;color:var(--text2);min-width:16px">'+count+'</span></div>';}).join('');
}
function buildMonthWtChart(wtMo){
  if(wtMo.length<2)return'<div class="empty">Log more entries to see trend</div>';
  var vals=wtMo.map(function(e){return e.kg;}),min=Math.min.apply(null,vals)-0.5,max=Math.max.apply(null,vals)+0.5,w=300,h=80;
  var pts=vals.map(function(v,i){return((i/(vals.length-1))*w)+','+(h-((v-min)/(max-min))*h);}).join(' ');
  var last=vals[vals.length-1],first=vals[0],diff=(last-first).toFixed(1);
  var col=parseFloat(diff)<0?'var(--teal)':parseFloat(diff)>0?'var(--red)':'var(--accent)';
  var dots=vals.map(function(v,i){return'<circle cx="'+((i/(vals.length-1))*w)+'" cy="'+(h-((v-min)/(max-min))*h)+'" r="3.5" fill="'+col+'"/>';}).join('');
  return'<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px"><span style="color:var(--text2)">Start: <b>'+first+'kg</b></span><span style="color:'+col+';font-weight:600">'+(parseFloat(diff)>0?'+':'')+diff+'kg</span><span style="color:var(--text2)">Now: <b>'+last+'kg</b></span></div><div class="wt-chart"><svg viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none"><polyline points="'+pts+'" fill="none" stroke="'+col+'" stroke-width="2.5" stroke-linejoin="round"/>'+dots+'</svg></div>';
}
function renderMonth(){
  var now=new Date(),yr=now.getFullYear(),mo=now.getMonth();
  var firstDay=new Date(yr,mo,1).getDay(),offset=(firstDay+6)%7,dim=new Date(yr,mo+1,0).getDate();
  var cells=[];for(var i=0;i<offset;i++)cells.push(null);for(var d=1;d<=dim;d++)cells.push(d);
  var moKey=yr+'-'+String(mo+1).padStart(2,'0');
  var moTasks=S.tasks.filter(function(t){return t.date&&t.date.startsWith(moKey);});
  var moMoods=Object.entries(S.moodLog).filter(function(e){return e[0].startsWith(moKey);}).map(function(e){return e[1];});
  var avgMood=moMoods.length?moMoods.reduce(function(a,b){return a+b;},0)/moMoods.length:null;
  var wtMo=S.weightLog.filter(function(w){return w.date.startsWith(moKey);});
  var todayStr=todayKey();
  document.getElementById('page-month').innerHTML=
    '<div class="hdr"><div><h1>'+now.toLocaleDateString('en-GB',{month:'long'})+'</h1><p>'+yr+'</p></div></div>'+
    '<div class="stats-row"><div class="stat-box"><div class="stat-num">'+moTasks.filter(function(t){return t.done;}).length+'/'+moTasks.length+'</div><div class="stat-lbl">Tasks</div></div>'+
    '<div class="stat-box"><div class="stat-num">'+(avgMood!==null?MOODS[Math.round(avgMood)]:'–')+'</div><div class="stat-lbl">Avg mood</div></div>'+
    '<div class="stat-box"><div class="stat-num">'+(wtMo.length?wtMo[wtMo.length-1].kg+'kg':'–')+'</div><div class="stat-lbl">Latest wt</div></div></div>'+
    '<div class="card"><div class="month-hdr-row"><div class="month-hdr-cell">M</div><div class="month-hdr-cell">T</div><div class="month-hdr-cell">W</div><div class="month-hdr-cell">T</div><div class="month-hdr-cell">F</div><div class="month-hdr-cell">S</div><div class="month-hdr-cell">S</div></div><div class="month-grid">'+buildCalGrid(cells,yr,mo,todayStr)+'</div></div>'+
    '<div class="card"><div class="card-title">Weight this month</div>'+buildMonthWtChart(wtMo)+'</div>'+
    '<div class="card"><div class="card-title">Category breakdown</div>'+buildCatBreakdown(moTasks)+'</div>';
}

// ── Friends ──
function renderFriends(){
  var friends = userProfile ? userProfile.friends || [] : [];
  var friendEntries = friends.map(function(f){return S.friendData[f];}).filter(Boolean);
  var today = todayKey();
  var myTasks = S.tasks.filter(function(t){return t.date===today||t.repeat!=='none';});
  var myPct = myTasks.length ? Math.round(myTasks.filter(function(t){return t.done;}).length/myTasks.length*100) : 0;
  var habitAvg = S.habits.length ? Math.round(S.habits.reduce(function(a,h){return a+(h.pct||0);},0)/S.habits.length) : 0;
  var myMood = S.moodLog[today] !== undefined ? MOODS[S.moodLog[today]] : '-';

  var frCards = '';
  friendEntries.forEach(function(f) {
    var pct = f.taskPct || 0;
    var mood = f.mood !== null && f.mood !== undefined ? MOODS[f.mood] : '-';
    var moodCol = f.mood >= 3 ? 'var(--teal)' : f.mood <= 1 ? 'var(--red)' : 'var(--amber)';
    frCards += '<div class="friend-card" data-fuid="'+f.uid+'">'+
      '<div class="friend-top"><div class="friend-avatar">'+(f.avatar||'🌿')+'</div>'+
      '<div class="friend-info"><div class="friend-name">'+f.displayName+'</div><div class="friend-status">'+(f.status||'No status')+'</div></div>'+
      '<div style="font-size:24px">'+mood+'</div></div>'+
      '<div class="friend-stats">'+
        '<div class="friend-stat"><div class="friend-stat-lbl">Today progress</div><div class="friend-stat-val" style="color:var(--accent)">'+pct+'%</div><div class="prog-bar" style="margin-top:6px"><div class="prog-fill" style="width:'+pct+'%"></div></div></div>'+
        '<div class="friend-stat"><div class="friend-stat-lbl">Mood</div><div class="friend-stat-val" style="color:'+moodCol+'">'+mood+'</div></div>'+
      '</div>'+
      '<button class="task-del remove-friend-btn" data-uid="'+f.uid+'" style="margin-top:10px;font-size:12px;color:var(--text3);width:100%;text-align:center">Remove friend</button></div>';
  });

  var noFriends = friendEntries.length === 0 ?
    '<div class="card"><div class="empty"><div class="empty-icon">👥</div>No friends yet!<br>Share your code or add someones</div><button class="btn btn-accent btn-sm btn-full" onclick="openAddFriend()">+ Add a friend</button></div>' : '';

  document.getElementById('page-friends').innerHTML =
    '<div class="hdr"><div><h1>Friends</h1><p>Accountability squad 💪</p></div><div class="hdr-actions"><div class="icon-btn" onclick="openAddFriend()">+</div></div></div>'+
    '<div class="card" style="border-color:var(--accent3)"><div class="card-title">Your profile</div>'+
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">'+
      '<div class="friend-avatar" style="font-size:26px;cursor:pointer;border-color:var(--accent)" id="edit-profile-btn">'+(userProfile?userProfile.avatar:'🌿')+'</div>'+
      '<div style="flex:1"><div style="font-size:16px;font-weight:600">'+(userProfile?userProfile.displayName:'')+'</div><div style="font-size:12px;color:var(--text2);margin-top:2px">'+(userProfile?userProfile.status||'No status set':'')+'</div></div>'+
      '<div style="font-size:22px">'+myMood+'</div></div>'+
    '<div class="friend-stats" style="margin-bottom:14px">'+
      '<div class="friend-stat"><div class="friend-stat-lbl">Today tasks</div><div class="friend-stat-val" style="color:var(--accent)">'+myPct+'%</div><div class="prog-bar" style="margin-top:6px"><div class="prog-fill" style="width:'+myPct+'%"></div></div></div>'+
      '<div class="friend-stat"><div class="friend-stat-lbl">Habit avg</div><div class="friend-stat-val" style="color:var(--orange)">'+habitAvg+'%</div></div>'+
    '</div>'+
    '<div style="font-size:11px;color:var(--text2);margin-bottom:6px">Your friend code - tap to copy</div>'+
    '<div class="friend-code-box" id="copy-code-btn"><span class="friend-code">'+(userProfile?userProfile.friendCode:'------')+'</span><span style="font-size:12px;color:var(--text3)">tap to copy 📋</span></div></div>'+
    noFriends + frCards;

  // Attach events after render
  var editBtn = document.getElementById('edit-profile-btn');
  if (editBtn) editBtn.onclick = openEditProfile;
  var copyBtn = document.getElementById('copy-code-btn');
  if (copyBtn) copyBtn.onclick = copyCode;
  document.querySelectorAll('.remove-friend-btn').forEach(function(btn) {
    btn.onclick = function() { removeFriend(btn.getAttribute('data-uid')); };
  });
}
function openAddFriend(){openModal('<div class="modal-title">Add a friend 👥</div><p style="font-size:13px;color:var(--text2);margin-bottom:12px;line-height:1.5">Enter their 6-character friend code.</p><input class="inp" id="friend-code-input" placeholder="ABC123" maxlength="6" style="text-transform:uppercase;font-family:var(--mono);font-size:22px;letter-spacing:4px;text-align:center;margin-bottom:12px"><button class="btn btn-accent btn-sm btn-full" onclick="addFriend()">Add friend</button>');}
function copyCode(){navigator.clipboard.writeText(userProfile?userProfile.friendCode:'').then(function(){showToast('Code copied! 📋');}).catch(function(){showToast(userProfile?userProfile.friendCode:'–');});}
function openEditProfile(){
  openModal('<div class="modal-title">Edit profile</div>'+
    '<div style="font-size:12px;color:var(--text2);margin-bottom:6px">Pick your avatar</div>'+
    '<div class="emoji-grid" id="avatar-grid" style="grid-template-columns:repeat(5,1fr);margin-bottom:14px"></div>'+
    '<input class="inp" id="edit-name" placeholder="Display name" style="margin-bottom:10px">'+
    '<input class="inp" id="edit-status" placeholder="Status (e.g. Grinding 💪)" style="margin-bottom:12px">'+
    '<button class="btn btn-accent btn-sm btn-full" onclick="saveProfileEdit()">Save profile</button>');
  document.getElementById('edit-name').value = userProfile ? userProfile.displayName || '' : '';
  document.getElementById('edit-status').value = userProfile ? userProfile.status || '' : '';
  window._selAvatar = userProfile ? userProfile.avatar : '🌿';
  var grid = document.getElementById('avatar-grid');
  if (grid) {
    AVATARS.forEach(function(e) {
      var d = document.createElement('div');
      d.className = 'emoji-opt' + (userProfile && userProfile.avatar === e ? ' sel' : '');
      d.textContent = e;
      d.onclick = function() { selectAvatar(d, e); };
      grid.appendChild(d);
    });
  }
}
function selectAvatar(el,e){document.querySelectorAll('.emoji-opt').forEach(function(x){x.classList.remove('sel');});el.classList.add('sel');window._selAvatar=e;}
function saveProfileEdit(){
  var name=document.getElementById('edit-name').value.trim();
  var status=document.getElementById('edit-status').value.trim();
  if(!name)return;
  userProfile=Object.assign({},userProfile,{displayName:name,status:status,avatar:window._selAvatar||userProfile.avatar});
  db.collection('users').doc(currentUser.uid).update({displayName:name,status:status,avatar:window._selAvatar||userProfile.avatar});
  closeModal();renderFriends();showToast('Profile updated ✓');
}

// ── More ──
function renderMore(){
  var habitsHTML = S.habits.map(function(h){
    var r=18, circ=2*Math.PI*r, offset=circ*(1-(h.pct||0)/100);
    return '<div class="habit-item"><div class="habit-ring-wrap"><svg viewBox="0 0 44 44" style="position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)"><circle class="habit-ring-bg" cx="22" cy="22" r="'+r+'"/><circle class="habit-ring-fill" cx="22" cy="22" r="'+r+'" stroke-dasharray="'+circ+'" stroke-dashoffset="'+offset+'"/></svg><div class="habit-ring-icon">'+h.icon+'</div></div><div class="habit-body"><div class="habit-name">'+h.name+'</div><div class="habit-streak">🔥 <b>'+h.streak+'</b> day streak &#183; <span style="color:var(--accent)">'+(h.pct||0)+'%</span></div></div><button class="task-del del-habit-more" data-hid="'+h.id+'">✕</button></div>';
  }).join('');

  document.getElementById('page-more').innerHTML =
    '<div class="hdr"><div><h1>More</h1><p>Settings &amp; tools</p></div></div>'+
    '<div class="card"><div class="card-title">Theme</div><div class="theme-grid" id="theme-grid"></div></div>'+
    '<div class="card"><div class="card-title">Account</div><div class="setting-row"><div><div class="setting-lbl">'+(userProfile?userProfile.displayName:'User')+'</div><div class="setting-sub">'+(currentUser?currentUser.email:'')+'</div></div><button class="btn btn-ghost btn-sm" onclick="doSignout()">Sign out</button></div></div>'+
    '<div class="card"><div class="card-title">AI coach - Groq (free)</div><div class="setting-row"><div><div class="setting-lbl">Groq API key</div><div class="setting-sub">'+(S.apiKey?'✓ Active - AI coach enabled':'Not set &#183; get free key at console.groq.com')+'</div></div><button class="btn btn-ghost btn-sm" onclick="openApiModal()">Edit</button></div>'+(S.apiKey?'<button class="btn btn-ghost btn-sm" onclick="clearChat()" style="margin-top:8px;width:100%">Clear chat history</button>':'')+'</div>'+
    '<div class="card"><div class="card-title">Habits</div>'+habitsHTML+'<button class="btn btn-ghost btn-sm btn-full" onclick="openAddHabit()">+ Add habit</button></div>'+
    '<div class="card"><div class="card-title">&#x1F4F1; Add to home screen</div><p style="font-size:13px;color:var(--text2);line-height:1.8"><b style="color:var(--text)">Android Chrome:</b> Tap &#8942; &#8594; Add to Home screen<br><b style="color:var(--text)">iPhone Safari:</b> Tap Share &#8594; Add to Home Screen<br><b style="color:var(--text)">Laptop:</b> Bookmark in any browser<br><span style="color:var(--teal)">&#x1F504; All data syncs across devices via Firebase</span></p></div>'+
    '<div class="card"><div class="card-title">Data</div><div class="setting-row"><div><div class="setting-lbl">Clear all data</div><div class="setting-sub">Tasks, habits, logs - permanent</div></div><button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="clearAllData()">Clear</button></div></div>';

  // Build theme grid with DOM
  var themeGridEl = document.getElementById('theme-grid');
  if (themeGridEl) {
    THEMES.forEach(function(t) {
      var btn = document.createElement('button');
      btn.className = 'theme-btn' + ((S.theme||'dark')===t.id?' active':'');
      btn.style.background = t.bg;
      btn.style.color = t.dot;
      btn.innerHTML = '<div class="theme-dot" style="background:'+t.dot+'"></div>'+t.label;
      btn.onclick = function() { setTheme(t.id); };
      themeGridEl.appendChild(btn);
    });
  }
  // Attach habit delete buttons
  document.querySelectorAll('.del-habit-more').forEach(function(btn) {
    btn.onclick = function() { deleteHabitMore(btn.getAttribute('data-hid')); };
  });
}
function setTheme(t){S.theme=t;applyTheme(t);scheduleSave();renderMore();}
function openApiModal(){openModal('<div class="modal-title">Groq API key</div><p style="font-size:13px;color:var(--text2);margin-bottom:10px;line-height:1.5">Free at <span style="color:var(--teal)">console.groq.com</span> → API Keys → Create.</p><input class="inp" type="password" id="api-modal-inp" placeholder="gsk_..." value="'+S.apiKey+'" style="margin-bottom:10px"><button class="btn btn-accent btn-sm btn-full" onclick="saveApiModal()">Save key</button>');}
function saveApiModal(){S.apiKey=document.getElementById('api-modal-inp').value.trim();scheduleSave();closeModal();renderMore();showToast('API key saved ✓');}
function deleteHabitMore(id){S.habits=S.habits.filter(function(h){return h.id!==id;});scheduleSave();renderMore();}
function clearAllData(){if(!confirm('Clear all data? Cannot be undone.'))return;db.collection('data').doc(currentUser.uid).update({tasks:[],habits:[],goals:[],healthLog:{},weightLog:[],moodLog:{},chatMessages:[]});showToast('Data cleared');}

// ── Modal / Toast ──
function openModal(html){document.getElementById('modal-body').innerHTML=html;document.getElementById('modal-overlay').classList.add('open');}
function closeModal(e){if(e&&e.target!==document.getElementById('modal-overlay'))return;document.getElementById('modal-overlay').classList.remove('open');}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}

applyTheme(S.theme||'dark');
showPage('today');
</script>
